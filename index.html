<!DOCTYPE html>
<html lang="it">

<head>

<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col font-sans overflow-x-hidden">

    <!-- HEADER -->
    <header class="border-b border-gray-800 bg-gray-950/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="app.navigate('home')">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-tr from-magis-600 to-indigo-500 flex items-center justify-center shadow-lg shadow-magis-500/30">
                    <i data-lucide="scale" class="text-white w-4 h-4"></i>
                </div>
                <span id="app-logo-text"
                    class="font-display font-bold text-xl tracking-tight brand-gradient">ConcorsiPubblici.ai</span>
            </div>
            <nav class="hidden lg:flex items-center gap-6">
                <button onclick="app.navigate('home')" data-route="home"
                    class="nav-btn text-sm font-medium text-gray-300 hover:text-white transition">Dashboard</button>
                <button onclick="app.navigate('lezione')" data-route="lezione"
                    class="nav-btn text-sm font-medium text-gray-300 hover:text-white transition flex items-center gap-1"><i
                        data-lucide="book-open" class="w-4 h-4 text-amber-400"></i> Lezione</button>
                <button onclick="app.navigate('quiz')" data-route="quiz"
                    class="nav-btn text-sm font-medium text-gray-300 hover:text-white transition flex items-center gap-1"><i
                        data-lucide="list-todo" class="w-4 h-4 text-yellow-500"></i> Quiz AI</button>
                <button onclick="app.navigate('glossario')" data-route="glossario"
                    class="nav-btn text-sm font-medium text-gray-300 hover:text-white transition">Glossario
                    Smart</button>
                <button onclick="app.navigate('tracce')" data-route="tracce"
                    class="nav-btn text-sm font-medium text-gray-300 hover:text-white transition">Database
                    Tracce</button>
                <button onclick="app.navigate('bandi')" data-route="bandi"
                    class="nav-btn text-sm font-medium text-gray-300 hover:text-white transition flex items-center gap-1"><i
                        data-lucide="megaphone" class="w-4 h-4 text-amber-400"></i> Bandi</button>
                <button onclick="app.navigate('community-forum')" data-route="community-forum"
                    class="nav-btn text-sm font-medium text-gray-300 hover:text-white transition flex items-center gap-1"><i
                        data-lucide="users" class="w-4 h-4"></i> Community</button>
            </nav>
            <div class="flex items-center gap-4">
                <div class="hidden lg:block w-px h-5 bg-gray-800"></div>
                <!-- Mini Timer in nav se attivo, visibile ovunque -->
                <div id="nav-timer-container"
                    class="hidden items-center gap-2 bg-gray-900 px-3 py-1.5 rounded-full border border-gray-800 cursor-pointer"
                    onclick="app.navigate('simulation')">
                    <div id="nav-timer-dot" class="w-2 h-2 rounded-full pulse-ani bg-magis-500"></div>
                    <span id="nav-timer-text" class="text-xs font-mono font-bold text-magis-400">00:00:00</span>
                </div>
                <button id="comfort-mode-toggle" onclick="app.toggleComfortMode()" class="theme-toggle-btn hidden lg:flex" title="Modalità Comfort — Tema chiaro per la vista">
                    <i id="comfort-icon-sun" data-lucide="sun" class="w-3.5 h-3.5"></i>
                    <i id="comfort-icon-moon" data-lucide="moon" class="w-3.5 h-3.5" style="display:none"></i>
                    <span class="hidden xl:inline">Comfort</span>
                    <div class="toggle-track"><div class="toggle-thumb"></div></div>
                </button>
                <button onclick="app.openAiModal()" class="hidden lg:flex w-8 h-8 items-center justify-center text-gray-500 hover:text-white transition rounded-lg hover:bg-gray-800" title="Impostazioni">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                </button>
                <button id="nav-auth-btn" onclick="app.openAuthModal()" class="flex items-center gap-2 px-4 py-2 bg-magis-600 hover:bg-magis-500 text-white text-sm font-bold rounded-lg transition shadow-lg shadow-magis-600/20" title="Accedi o Registrati">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Accedi</span>
                </button>
                <!-- Avatar (visible when logged in) -->
                <button id="nav-avatar-btn" onclick="app.navigate('profile')" class="hidden w-9 h-9 rounded-full overflow-hidden border-2 border-gray-700 hover:border-magis-500 transition shadow-lg cursor-pointer" title="Il mio profilo">
                    <img id="nav-avatar-img" src="https://i.pravatar.cc/150?u=guest" alt="Avatar" class="w-full h-full object-cover">
                </button>
            </div>
        </div>
    </header>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <nav class="lg:hidden fixed bottom-0 w-full bg-gray-950/95 backdrop-blur-md border-t border-gray-800 z-50 px-2 pb-0"
        style="padding-bottom: env(safe-area-inset-bottom, 0px);">
        <div class="flex justify-around items-center h-16">
            <button onclick="app.navigate('home')" data-route="home"
                class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-white transition group focus:outline-none">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mb-1 transition-colors"></i>
                <span class="text-[10px] font-medium">Home</span>
            </button>
            <button onclick="app.navigate('lezione')" data-route="lezione"
                class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-white transition group focus:outline-none">
                <i data-lucide="book-open" class="w-5 h-5 mb-1 text-amber-400 transition-colors"></i>
                <span class="text-[10px] font-medium text-amber-400/80">Lezione</span>
            </button>
            <button onclick="app.navigate('quiz')" data-route="quiz"
                class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-white transition group focus:outline-none">
                <i data-lucide="list-todo" class="w-5 h-5 mb-1 text-yellow-500 transition-colors"></i>
                <span class="text-[10px] font-medium text-yellow-500/80">Quiz</span>
            </button>
            <button onclick="app.navigate('glossario')" data-route="glossario"
                class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-white transition group focus:outline-none">
                <i data-lucide="book-open" class="w-5 h-5 mb-1 transition-colors"></i>
                <span class="text-[10px] font-medium">Glossario</span>
            </button>
            <button onclick="app.navigate('bandi')" data-route="bandi"
                class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-white transition group focus:outline-none">
                <i data-lucide="megaphone" class="w-5 h-5 mb-1 text-amber-400 transition-transform"></i>
                <span class="text-[10px] font-medium text-amber-400/80">Bandi</span>
            </button>
            <button onclick="app.navigate('community-forum')" data-route="community-forum"
                class="mobile-nav-btn flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-white transition group focus:outline-none">
                <i data-lucide="users" class="w-5 h-5 mb-1 transition-transform"></i>
                <span class="text-[10px] font-medium">Social</span>
            </button>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main id="main-content" class="flex-grow w-full max-w-7xl mx-auto px-4 md:px-6 pt-6 pb-24 lg:py-8 relative">
        <!-- Views will be injected here by app.js -->
    </main>
    <!-- Modals Container — Populated by js/views/modals.js -->
    <!-- Modals Container — Populated by js/views/modals.js -->
    <div id="modals-container"></div>

    <!-- AI Tutor Chatbot UI -->
    <div id="tutor-chat-widget" class="fixed bottom-6 right-6 z-[300] flex flex-col items-end pointer-events-none">
        
        <!-- Finestra della Chat (Inizialmente nascosta) -->
        <div id="tutor-chat-panel" class="pointer-events-auto w-80 sm:w-96 h-[500px] max-h-[80vh] bg-gray-900 border border-theme-glow shadow-2xl rounded-2xl mb-4 flex flex-col overflow-hidden transition-all duration-300 transform origin-bottom-right scale-0 opacity-0">
            <!-- Header Chat -->
            <div class="bg-gray-950 p-4 border-b border-gray-800 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-magis-600 to-indigo-500 p-[2px]">
                            <img src="./cicero.png" class="w-full h-full rounded-full border border-gray-900 object-cover" />
                        </div>
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-gray-900 rounded-full"></div>
                    </div>
                    <div>
                        <h4 class="text-white font-bold text-sm leading-tight">CiceroAI</h4>
                        <p class="text-magis-400 text-[10px] uppercase font-bold tracking-widest">Tutor Personale</p>
                    </div>
                </div>
                <button onclick="app.toggleTutorChat()" class="text-gray-500 hover:text-white transition p-1"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <!-- Area Messaggi -->
            <div id="tutor-chat-messages" class="flex-grow p-4 overflow-y-auto custom-scrollbar flex flex-col gap-4 bg-gray-950/50">
                <!-- I messaggi verranno inseriti via JS -->
            </div>
            
            <!-- Area Input -->
            <div class="p-3 bg-gray-950 border-t border-gray-800">
                <form id="tutor-chat-form" onsubmit="app.tutorSendMessage(event)" class="relative">
                    <input type="text" id="tutor-chat-input" placeholder="Chiedi un consiglio o una spiegazione..." autocomplete="off" class="w-full bg-gray-900 text-white text-sm rounded-xl py-3 pl-4 pr-12 border border-gray-800 focus:border-magis-500 outline-none transition placeholder-gray-600">
                    <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 bg-magis-600 text-white rounded-lg hover:bg-magis-500 disabled:opacity-50 disabled:cursor-not-allowed transition">
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- Floating Action Button -->
        <button id="tutor-fab" onclick="app.toggleTutorChat()" class="pointer-events-auto relative w-16 h-16 rounded-full bg-gradient-to-br from-magis-600 to-indigo-600 fab-glow flex items-center justify-center text-white hover:scale-105 active:scale-95 transition-transform group">
            <i data-lucide="bot" class="w-7 h-7 group-hover:hidden"></i>
            <i data-lucide="message-circle" class="w-7 h-7 hidden group-hover:block"></i>
            <!-- Notification Badge -->
            <div id="tutor-badge" class="absolute top-0 right-0 w-4 h-4 bg-red-500 border-2 border-gray-950 text-[10px] font-bold text-white rounded-full flex items-center justify-center opacity-0 transition-opacity">1</div>
        </button>
    </div>

    <!-- Scripts — ES Module Architecture -->
    <script type="module" src="js/main.js?v=5"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker Registrato!', reg);

                    // Controlla se c'è un aggiornamento in attesa
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                                // C'è una nuova versione pronta
                                if (typeof showToast === 'function') showToast("Nuova versione disponibile! Ricarica per aggiornare.", "info");
                            }
                        });
                    });
                }).catch(err => {
                    console.log('Error registering SW', err);
                });
            });
        }
    </script>
</body>
